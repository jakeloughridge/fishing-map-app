kind = "web"
previewPath = "/"
title = "Fishing Map"
version = "1.0.0"
id = "artifacts/fishing-map"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23955

[services.development]
run = "pnpm --filter @workspace/fishing-map run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fishing-map", "run", "build" ]
serve = "static"
publicDir = "artifacts/fishing-map/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23955"
BASE_PATH = "/"
